<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM PRACTICE</title>
</head>
<body>
    <h2>EVENT REGISTRATION</h2>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <br>
        <br>

        <label for="emailID">Email ID: </label>
        <input type="email" id="emailID" name="emailID">
        <br>
        <br>

        <label for="phoneNumber">phoneNumber</label>
        <input type="number" id="phoneNumber" name="phoneNumber">
        <br>
        <br>
        <label for="occupation">Occupation</label>
        <select name="occupation" id="occupation">
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
            <option value="staff">Staff</option>
            <option value="other">Other</option>
        </select>
        <br>
        <br>
       
        <fieldset>
            <legend>Topic of Interest</legend>
            <label for="checkbox1">Html</label>
            <input type="checkbox" name="checkbox" id="checkbox"><br>
            <label for="checkbox2">CSS</label>
            <input type="checkbox" name="checkbox2" id="checkbox2"><br>
            <label for="checkbox3">JS</label>
            <input type="checkbox" name="checkbox3" id="checkbox3"><br>

        </fieldset>
        <br>

        <label for="comments">COMMENT:</label>
        <br>
        <textarea name="comments" id="comments"></textarea>
        <input type="submit" value="Register">




        
    </form>
    
</body>
</html>
