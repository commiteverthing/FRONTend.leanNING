<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datalist</title>

</head>
<body>
 <form >
    <input list="browser">
    <datalist id="browser">
        <option value="Edge"></option>
        <option value="Firefox"></option>
        <option value="Chrome"></option>
        <option value="Opera"></option>
        <option value="Safiri"></option>
        <!-- <button id="button">click here</button> -->
        
    </datalist>
    <!-- <label for="button">Submit</label> That won’t work because <datalist> only accepts <option> elements. It is not a container for interactive UI elements like buttons, labels, divs, etc. -->
    <button id="button">click here</button>
        
 </form>   
</body>
</html>
