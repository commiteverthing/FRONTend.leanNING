<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign UP</title>
</head>
<body>
    <main>
        <header>
            <h1 id="logo">Sign Up Page </h1>
        </header>


        <form>

            <label for="name">ENTER YOUR Name:</label><br>
            <input type="text" id="name" value="name here" required>
            
            <br><br>

            <label for="email" id="email">ENTER YOUR EMAIL</label><br>
            <input type="email" id="email" name="email" value="email here" required>

            <br><br>
            <label for="password" id="password">ENTER YOUR PASSWORD:</label><br>
            <input type="password" id="password" name="password" required>

            <br><br>
            <label for="cpassword" id="cpassword">Confirm your password</label><br>
            <input type="password" id="cpassword" name="cpassword">

            <br><br>

            

            
            <button>sign up</button>
            














        </form>








    </main>
</body>
</html>
