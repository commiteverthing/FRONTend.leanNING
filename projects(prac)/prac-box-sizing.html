<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOX-SIZING practice</title>

    <style>
        #content-box
        {
          width: 500px;
          border: 3px solid black;
          background-color: aqua; 
          padding: 25px; 
        }


        #border-box
        {
            box-sizing: border-box;
            width: 500px;
            border: 3px solid red;
            background-color: brown;
            padding-right: 25px;
        }
    </style>
</head>
<body>

    <div id="content-box">
        content-box
    </div>
    
    
    <div id="border-box">
        border-box
    </div>
</body>
</html>
